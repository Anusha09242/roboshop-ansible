- name: configuring catalogue server
  hosts: catalogue
  become: yes
  tasks: 
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs
    package: 
      name: nodejs
      state: present
  - name: create system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: roboshop system user
  - name: remove app directory
    file: 
      path: /app
      state: absent
  - name: delete catalogue.zip in tmp directory
    file:
      path: /tmp/catalogue.zip
      state: absent
  - name: create app directory
    file:
      path: /app
      state: directory
  - name: download catalogue zip file
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
  - name: unzip catalogue file
    unarchive:
      src: /tmp/catalogue.zip
      dest: /app 
      remote_src: yes
  - name: install dependencies
    community.general.npm:
      path: /app
  - name: copy catalogue service
    template:
      src: catalogue.service.j2
      dest: /etc/systemd/system/catalogue.service
  - name: copy mongo repo
    copy: 
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  - name: install mongodb client
    package:
      name: mongodb-mongosh
      state: present
  - name: check catalogue schema exists or not
    shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output
    tags:
    - mongodb
  - name: print catalogue output
    debug:
      msg: "{{ catalogue_output }}"
    tags:
    - mongodb
  - name: load products
    shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout | int < 0
    tags:
    - mongodb
  - name: daemon reload
    systemd_service:
      daemon_reload: true
  - name: enable and restart catalogue
    service:
      name: catalogue
      state: restarted
