- name: configuring rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks: 
  - name: copy rabbitmq repo
    copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
  - name: install rabbitmq server
    package:
      name: rabbitmq-server
      state: present
  - name: start and enable the rabbitmq server
    service:
      name: rabbitmq-server
      state: started
      enabled: yes