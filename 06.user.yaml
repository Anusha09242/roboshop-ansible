- name: configuring user server
  hosts: user
  become: yes
  tasks:
  - name: enable nodejs 20
    shell: dnf module enable nodejs:20 -y
  - name: install nodejs
    package:
      name: nodejs
      state: present
  - name: create system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove app directory
    file:
      path: /app
      state: absent
  - name: remove the user.zip in tmp directory
    file: 
      path: /tmp/user.zip
      state: absent
  - name: create app directory
    file:
      path: /app
      state: directory
  - name: download user code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip
  - name: unzip the user code
    unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
  - name: install dependencies
    npm:
      path: /app
